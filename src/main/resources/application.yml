spring:
  application:
    name: spring-redis-sample

  datasource:
    url: jdbc:mysql://localhost:3306/spring_redis_sample?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: 1234
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

jwt:
  secret: your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.example.springredissample: DEBUG
    org.springframework.security: DEBUG
