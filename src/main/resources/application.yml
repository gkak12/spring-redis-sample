spring:
  application:
    name: spring-redis-sample

  datasource:
    url: jdbc:mysql://localhost:3306/spring_redis_sample?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: your_redis_password

jwt:
  secret: your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: 8080

logging:
  level:
    com.example.springredissample: DEBUG
    org.springframework.security: DEBUG
